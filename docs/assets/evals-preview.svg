<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Evals Preview</title>
  <desc id="desc">Preview of the checked-in AI eval report and shipped corpus.</desc>
  <rect width="1200" height="720" fill="#F5F5F4"/>
  <rect x="56" y="56" width="1088" height="608" rx="28" fill="#FFFFFF" stroke="#D6D3D1" stroke-width="2"/>
  <text x="104" y="140" fill="#1C1917" font-family="Georgia, serif" font-size="38" font-weight="700">AI Eval Report</text>
  <text x="104" y="182" fill="#57534E" font-family="Arial, sans-serif" font-size="20">Nightly checks use the same template engine as the app.</text>
  <rect x="104" y="224" width="244" height="176" rx="24" fill="#1C1917"/>
  <text x="132" y="284" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">Corpus</text>
  <text x="132" y="324" fill="#D6D3D1" font-family="Arial, sans-serif" font-size="40" font-weight="700">4</text>
  <text x="132" y="356" fill="#D6D3D1" font-family="Arial, sans-serif" font-size="18">sanitized PDF fixtures</text>
  <rect x="380" y="224" width="244" height="176" rx="24" fill="#E34234"/>
  <text x="408" y="284" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">Threshold</text>
  <text x="408" y="324" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="40" font-weight="700">75%</text>
  <text x="408" y="356" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18">minimum weighted score</text>
  <rect x="656" y="224" width="384" height="360" rx="24" fill="#FBFAF9" stroke="#D6D3D1" stroke-width="2"/>
  <text x="688" y="278" fill="#1C1917" font-family="Arial, sans-serif" font-size="20" font-weight="700">Checked-in report</text>
  <rect x="688" y="320" width="320" height="12" rx="6" fill="#A8A29E"/>
  <rect x="688" y="348" width="320" height="12" rx="6" fill="#A8A29E"/>
  <rect x="688" y="376" width="272" height="12" rx="6" fill="#A8A29E"/>
  <text x="688" y="434" fill="#1C1917" font-family="Arial, sans-serif" font-size="18" font-weight="700">Failures</text>
  <rect x="688" y="460" width="320" height="84" rx="18" fill="#FFFFFF" stroke="#E7E5E4" stroke-width="2"/>
  <rect x="714" y="488" width="172" height="10" rx="5" fill="#57534E"/>
  <rect x="714" y="514" width="256" height="10" rx="5" fill="#A8A29E"/>
  <rect x="104" y="446" width="520" height="138" rx="24" fill="#FBFAF9" stroke="#D6D3D1" stroke-width="2"/>
  <text x="136" y="500" fill="#1C1917" font-family="Arial, sans-serif" font-size="22" font-weight="700">Assertion types</text>
  <text x="136" y="540" fill="#57534E" font-family="Arial, sans-serif" font-size="20">contains, not_contains, json_field_equals, json_field_exists,</text>
  <text x="136" y="572" fill="#57534E" font-family="Arial, sans-serif" font-size="20">table_min_rows, pass_rate_weight, overall_score_min</text>
</svg>
